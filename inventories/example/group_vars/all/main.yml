---
xian_project_name: xian
xian_release_tag: latest
xian_registry_owner: xian-technology

xian_topology: integrated
xian_enable_dashboard: true
xian_enable_bds: false
xian_enable_monitoring: false

xian_deploy_root: /srv/xian
xian_runtime_dir: "{{ xian_deploy_root }}/runtime"
xian_cometbft_home: "{{ xian_deploy_root }}/node-home/.cometbft"
xian_bds_data_dir: "{{ xian_deploy_root }}/bds/postgres"
xian_bds_spool_dir: "{{ xian_deploy_root }}/bds/spool"
xian_monitoring_dir: "{{ xian_runtime_dir }}/monitoring"

# Path on the control machine.
xian_node_home_archive: /path/to/node-home.tar.gz
xian_state_snapshot_archive: ""
xian_node_home_replace: true

xian_moniker: xian-node
xian_seed_node: ""
xian_seed_node_address: ""
xian_allow_cors: true
xian_copy_genesis: false
xian_genesis_source: mainnet
xian_snapshot_url: ""
xian_validator_private_key_hex: ""

xian_prometheus_enabled: true
xian_service_node: false
xian_enable_pruning: false
xian_blocks_to_keep: 100000
xian_block_policy_mode: on_demand
xian_block_policy_interval: 0s

xian_statesync_enable: false
xian_statesync_rpc_servers: []
xian_statesync_trust_height: 0
xian_statesync_trust_hash: ""
xian_statesync_trust_period: 168h0m0s

xian_tracer_mode: python_line_v1
xian_metrics_enabled: true
xian_metrics_host: 0.0.0.0
xian_metrics_port: 9108
xian_metrics_bds_refresh_seconds: 5.0
xian_parallel_execution_enabled: false
xian_parallel_execution_workers: 0
xian_parallel_execution_min_transactions: 8
xian_pending_nonce_reservation_ttl_seconds: 60.0

xian_bds_dsn: ""
xian_bds_host: postgres
xian_bds_port: 5432
xian_bds_database: xian
xian_bds_user: xian
xian_bds_password: xian
xian_bds_pool_min_size: 1
xian_bds_pool_max_size: 10
xian_bds_statement_timeout_ms: 0
xian_bds_application_name: xian-bds
xian_bds_spool_warn_entries: 256
xian_bds_spool_warn_bytes: 536870912
xian_bds_disk_free_warn_bytes: 2147483648

xian_rpc_bind_host: 0.0.0.0
xian_rpc_port: 26657
xian_p2p_bind_host: 0.0.0.0
xian_p2p_port: 26656
xian_comet_metrics_bind_host: 127.0.0.1
xian_comet_metrics_port: 26660
xian_app_metrics_bind_host: 127.0.0.1
xian_dashboard_bind_host: 127.0.0.1
xian_dashboard_port: 8080
xian_prometheus_bind_host: 127.0.0.1
xian_prometheus_port: 9090
xian_grafana_bind_host: 127.0.0.1
xian_grafana_port: 3000

xian_perf_enabled: true
xian_perf_recent_blocks: 64
xian_s6_verbosity: 1

xian_node_image_integrated: "ghcr.io/{{ xian_registry_owner }}/xian-node:{{ xian_release_tag }}"
xian_node_image_split: "ghcr.io/{{ xian_registry_owner }}/xian-node-split:{{ xian_release_tag }}"
xian_postgres_image: postgres:17
xian_prometheus_image: prom/prometheus:v3.10.0
xian_grafana_image: grafana/grafana:12.2.0

xian_integrated_memory_limit: 2048m
xian_integrated_memory_reservation: 1024m
xian_fidelity_abci_memory_limit: 1536m
xian_fidelity_abci_memory_reservation: 768m
xian_fidelity_cometbft_memory_limit: 768m
xian_fidelity_cometbft_memory_reservation: 256m
xian_dashboard_memory_limit: 512m
xian_dashboard_memory_reservation: 256m
xian_postgres_memory_limit: 1024m
xian_postgres_memory_reservation: 512m
