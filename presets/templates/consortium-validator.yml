---
# Validator posture for a small shared-state network.
xian_topology: integrated
xian_enable_dashboard: false
xian_enable_bds: false
xian_enable_monitoring: false
xian_service_node: false

xian_block_policy_mode: idle_interval
xian_block_policy_interval: 10s
xian_tracer_mode: native_instruction_v1

xian_monitoring_dashboard_preset: overview
xian_monitoring_alert_preset: none
