---
- name: Restore a Xian state snapshot and redeploy
  hosts: xian_nodes
  become: true
  serial: 1
  vars:
    xian_state_snapshot_remote_path: "{{ xian_deploy_root }}/snapshots/state-snapshot.tar.gz"
    xian_restore_image: >-
      {{
        xian_node_image_integrated
        if xian_deploy_topology == "integrated"
        else xian_node_image_split
      }}
  pre_tasks:
    - name: Load node profile
      ansible.builtin.include_role:
        name: xian_profile

    - name: Validate state snapshot restore pins
      ansible.builtin.assert:
        that:
          - xian_state_snapshot_archive is string
          - xian_state_snapshot_archive | length > 0
          - xian_state_snapshot_sha256 is string
          - xian_state_snapshot_sha256 is match('^[0-9a-fA-F]{64}$')
          - xian_state_snapshot_expected_chain_id is string
          - xian_state_snapshot_expected_chain_id | length > 0
          - (xian_state_snapshot_expected_height | int) > 0
          - xian_state_snapshot_expected_app_hash is string
          - (xian_state_snapshot_expected_app_hash | length == 0) or (xian_state_snapshot_expected_app_hash is match('^[0-9a-fA-F]{64}$'))
        fail_msg: >-
          State snapshot restore requires xian_state_snapshot_archive,
          xian_state_snapshot_sha256, xian_state_snapshot_expected_chain_id,
          and xian_state_snapshot_expected_height. Optionally pin
          xian_state_snapshot_expected_app_hash.

    - name: Validate local state snapshot archive checksum and metadata
      ansible.builtin.command: >-
        {{ (ansible_playbook_python | default('python3')) | quote }}
        {{ (playbook_dir ~ '/../scripts/validate_state_snapshot_archive.py') | quote }}
        --archive {{ xian_state_snapshot_archive | quote }}
        --sha256 {{ xian_state_snapshot_sha256 | quote }}
        --expected-chain-id {{ xian_state_snapshot_expected_chain_id | quote }}
        --expected-height {{ xian_state_snapshot_expected_height | quote }}
        {% if xian_state_snapshot_expected_app_hash | length > 0 %}
        --expected-app-hash {{ xian_state_snapshot_expected_app_hash | quote }}
        {% endif %}
      delegate_to: localhost
      become: false
      changed_when: false
      register: xian_state_snapshot_validation
  tasks:
    - name: Stop runtime before restore
      ansible.builtin.include_role:
        name: xian_runtime
      vars:
        xian_runtime_action: stop

    - name: Create snapshot staging directory
      ansible.builtin.file:
        path: "{{ xian_deploy_root }}/snapshots"
        state: directory
        mode: "0755"

    - name: Upload state snapshot archive
      ansible.builtin.copy:
        src: "{{ xian_state_snapshot_archive }}"
        dest: "{{ xian_state_snapshot_remote_path }}"
        mode: "0644"

    - name: Import state snapshot into node home
      ansible.builtin.shell: >-
        docker run --rm
        -v {{ xian_cometbft_home | quote }}:/root/.cometbft
        -v {{ xian_state_snapshot_remote_path | quote }}:/snapshot.tar.gz:ro
        {{ xian_restore_image | quote }}
        xian-state-snapshot import --input-path /snapshot.tar.gz

    - name: Redeploy runtime after restore
      ansible.builtin.include_role:
        name: xian_runtime
      vars:
        xian_runtime_action: deploy
