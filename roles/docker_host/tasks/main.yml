---
- name: Install Docker runtime packages
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose-plugin
      - ca-certificates
      - tar
      - gzip
    update_cache: true
    state: present

- name: Enable Docker service
  ansible.builtin.systemd_service:
    name: docker
    enabled: true
    state: started

- name: Add remote user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true
  when:
    - ansible_user is defined
    - ansible_user != "root"

