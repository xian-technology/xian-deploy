---
- name: Reload sysctl
  ansible.builtin.command: sysctl --system
  changed_when: true

- name: Validate sshd configuration
  ansible.builtin.command: sshd -t
  changed_when: false
  listen: Restart ssh

- name: Restart ssh service
  ansible.builtin.systemd_service:
    name: "{{ xian_host_hardening_ssh_service_name }}"
    state: restarted
  listen: Restart ssh
