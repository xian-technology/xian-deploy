---
- name: Apply Xian host hardening baseline
  when: xian_host_hardening_enabled | bool
  block:
    - name: Write sysctl hardening profile
      ansible.builtin.copy:
        dest: /etc/sysctl.d/90-xian-hardening.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          # Managed by xian-deploy. Override xian_host_hardening_sysctl_settings in inventory.
          {% for setting in xian_host_hardening_sysctl_settings | dict2items | sort(attribute='key') %}
          {{ setting.key }} = {{ setting.value }}
          {% endfor %}
      notify: Reload sysctl
      when: xian_host_hardening_manage_sysctl | bool

    - name: Ensure sshd drop-in directory exists
      ansible.builtin.file:
        path: /etc/ssh/sshd_config.d
        state: directory
        owner: root
        group: root
        mode: "0755"
      when: xian_host_hardening_manage_ssh | bool

    - name: Ensure sshd reads drop-in configuration
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^Include\\s+/etc/ssh/sshd_config.d/\\*.conf"
        line: "Include /etc/ssh/sshd_config.d/*.conf"
        insertbefore: BOF
        owner: root
        group: root
        mode: "0644"
      notify: Restart ssh
      when: xian_host_hardening_manage_ssh | bool

    - name: Write sshd hardening drop-in
      ansible.builtin.copy:
        dest: /etc/ssh/sshd_config.d/90-xian-hardening.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          # Managed by xian-deploy. Override xian_host_hardening_ssh_settings in inventory.
          {% for setting in xian_host_hardening_ssh_settings | dict2items | sort(attribute='key') %}
          {{ setting.key }} {{ setting.value }}
          {% endfor %}
      notify: Restart ssh
      when: xian_host_hardening_manage_ssh | bool

    - name: Install unattended-upgrades package
      ansible.builtin.apt:
        name: unattended-upgrades
        update_cache: true
        state: present
      when: xian_host_hardening_manage_unattended_upgrades | bool

    - name: Configure unattended upgrades
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        owner: root
        group: root
        mode: "0644"
        content: |
          // Managed by xian-deploy.
          {% for setting in xian_host_hardening_unattended_upgrades_config | dict2items | sort(attribute='key') %}
          {{ setting.key }} "{{ setting.value }}";
          {% endfor %}
      when: xian_host_hardening_manage_unattended_upgrades | bool

    - name: Install fail2ban package
      ansible.builtin.apt:
        name: fail2ban
        update_cache: true
        state: present
      when: xian_host_hardening_manage_fail2ban | bool

    - name: Enable fail2ban service
      ansible.builtin.systemd_service:
        name: fail2ban
        enabled: true
        state: started
      when: xian_host_hardening_manage_fail2ban | bool

    - name: Install UFW package
      ansible.builtin.apt:
        name: ufw
        update_cache: true
        state: present
      when: xian_host_hardening_manage_firewall | bool

    - name: Configure UFW incoming policy
      ansible.builtin.command: "ufw default {{ xian_host_hardening_firewall_default_incoming_policy }} incoming"
      register: xian_host_hardening_ufw_incoming
      changed_when: "'Default incoming policy changed' in xian_host_hardening_ufw_incoming.stdout"
      when: xian_host_hardening_manage_firewall | bool

    - name: Configure UFW outgoing policy
      ansible.builtin.command: "ufw default {{ xian_host_hardening_firewall_default_outgoing_policy }} outgoing"
      register: xian_host_hardening_ufw_outgoing
      changed_when: "'Default outgoing policy changed' in xian_host_hardening_ufw_outgoing.stdout"
      when: xian_host_hardening_manage_firewall | bool

    - name: Allow required TCP ports through UFW
      ansible.builtin.command: "ufw allow {{ item }}/tcp"
      loop: "{{ xian_host_hardening_firewall_allowed_tcp_ports | unique | list }}"
      register: xian_host_hardening_ufw_allow
      changed_when: "'Rules updated' in xian_host_hardening_ufw_allow.stdout"
      when: xian_host_hardening_manage_firewall | bool

    - name: Read UFW status
      ansible.builtin.command: ufw status
      register: xian_host_hardening_ufw_status
      changed_when: false
      when: xian_host_hardening_manage_firewall | bool

    - name: Enable UFW
      ansible.builtin.command: ufw --force enable
      register: xian_host_hardening_ufw_enable
      changed_when: "'Firewall is active' in xian_host_hardening_ufw_enable.stdout"
      when:
        - xian_host_hardening_manage_firewall | bool
        - "'Status: active' not in xian_host_hardening_ufw_status.stdout"
