---
xian_runtime_action: deploy
xian_monitoring_dashboard_preset: overview
xian_monitoring_alert_preset: none
xian_snapshot_signing_keys: []
xian_snapshot_expected_chain_id: ""
xian_transaction_trace_logging: false
xian_app_log_level: INFO
xian_app_log_json: false
xian_app_log_rotation_hours: 1
xian_app_log_retention_days: 7
xian_simulation_enabled: true
xian_simulation_max_concurrency: 2
xian_simulation_timeout_ms: 3000
xian_simulation_max_chi: 1000000
xian_parallel_execution_max_speculative_waves: 4
xian_parallel_execution_min_wave_acceptance_ratio: 0.25
xian_parallel_execution_low_acceptance_min_wave_size: 8
xian_parallel_execution_warm_workers: true
xian_parallel_execution_access_estimates_enabled: true
xian_max_pending_nonces_per_sender: 128
